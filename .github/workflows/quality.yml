name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  php:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - run: composer install --no-interaction --prefer-dist
        working-directory: public_html

      - run: composer check
        working-directory: public_html
